<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>saco cosme - 素肌が深呼吸する、やさしい潤い。</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-container">
        <!-- Header -->
        <header class="header">
            <h1 class="logo">saco cosme</h1>
        </header>

        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-image-wrapper">
                <img src="images/hero_bg.png" alt="Hero background" class="hero-bg">
                <div class="hero-text">
                    <p class="hero-copy">素肌が深呼吸する、<br>やさしい潤い。</p>
                </div>
            </div>
        </section>

        <!-- Concept Section -->
        <section class="concept">
            <h2 class="section-title">Concept</h2>
            <p class="concept-text">
                毎日のスキンケアが楽しみになり、<br>
                心がほぐれるような心地よい時間を。<br><br>
                肌へのやさしさと潤いを、<br>
                自然体のあなたへお届けします。
            </p>
        </section>

        <!-- Products Section -->
        <section class="products">
            <h2 class="section-title">Lineup</h2>
            
            <!-- Product 1 -->
            <div class="product-card">
                <div class="fluid-shape shape-1">
                    <img src="images/product_lotion.png" alt="Moisture Lotion" class="product-img">
                </div>
                <div class="product-info">
                    <h3 class="product-name">Moisture Lotion</h3>
                    <p class="product-desc">みずみずしく潤す、高保湿化粧水</p>
                    <p class="product-price">¥3,500 <span class="tax">tax in</span></p>
                </div>
            </div>

            <!-- Product 2 -->
            <div class="product-card">
                <div class="fluid-shape shape-2">
                    <img src="images/product_serum.png" alt="Balancing Serum" class="product-img">
                </div>
                <div class="product-info">
                    <h3 class="product-name">Balancing Serum</h3>
                    <p class="product-desc">肌を整え、艶を与える美容液</p>
                    <p class="product-price">¥4,800 <span class="tax">tax in</span></p>
                </div>
            </div>
        </section>

        <!-- CTA Section -->
        <section class="cta">
            <p class="cta-message">あなたの肌に、やさしい潤いを。</p>
            <a href="https://forms.google.com/" target="_blank" rel="noopener noreferrer" class="btn-purchase">
                ご購入はこちら
            </a>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p class="copyright">&copy; saco cosme All Rights Reserved.</p>
        </footer>
    </div>
</body>
</html>
